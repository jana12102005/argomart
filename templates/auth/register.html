{% extends "layouts/home_master.html" %}
{% block title %}Register - AgroHands AI{% endblock %}
{% block content %}
<section class="w3l-about-breadcrumb text-left">
  <div class="breadcrumb-bg breadcrumb-bg-about py-sm-5 py-4">
    <div class="container py-2">
      <h2 class="title">Register</h2>
      <ul class="breadcrumbs-custom-path mt-2">
        <li><a href="{{ url_for('main.home') }}">Home</a></li>
        <li class="active"><span class="fa fa-arrow-right mx-2"></span> Register</li>
      </ul>
    </div>
  </div>
</section>
<div class="contact-form py-5">
  <div class="container py-lg-5 py-md-4">
    <h3 class="hny-title mb-lg-5 mb-4">Create an account</h3>
    <div class="row">
      <div class="col-lg-8">
        <form method="post" action="{{ url_for('auth.register') }}">
          <div class="form-group">
            <label>Full name *</label>
            <input type="text" name="name" class="form-control contact-input" placeholder="Your name" required>
          </div>
          <div class="form-group">
            <label>Email *</label>
            <input type="email" name="email" class="form-control contact-input" placeholder="Your email" required>
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="text" name="phone" class="form-control contact-input" placeholder="Phone">
          </div>
          <div class="form-group">
            <label>I am a *</label>
            <select name="role" class="form-control" id="roleSelect">
              <option value="farmer">Farmer</option>
              <option value="shopkeeper">Shopkeeper</option>
            </select>
          </div>
          <div id="shopFields" style="display:none;">
            <div class="form-group">
              <label>Shop name</label>
              <input type="text" name="shop_name" class="form-control contact-input" placeholder="Your shop name">
            </div>
            <div class="form-group">
              <label>Shop address</label>
              <textarea name="shop_address" class="form-control" rows="2" placeholder="Shop address"></textarea>
            </div>
          </div>
          <div class="form-group">
            <label>Password *</label>
            <input type="password" name="password" class="form-control contact-input" placeholder="Password" required minlength="6">
          </div>
          <button type="submit" class="btn btn-style btn-secondary">Register</button>
        </form>
        <p class="mt-3">Already have an account? <a href="{{ url_for('auth.login') }}">Login</a></p>
      </div>
    </div>
  </div>
</div>
<script>
document.getElementById('roleSelect').addEventListener('change', function() {
  document.getElementById('shopFields').style.display = this.value === 'shopkeeper' ? 'block' : 'none';
});
</script>
{% endblock %}
