{% extends "layouts/admin_master.html" %}
{% block title %}Adjust Inventory - Shopkeeper{% endblock %}
{% block content %}
<section class="w3l-about-breadcrumb text-left">
  <div class="breadcrumb-bg breadcrumb-bg-about py-sm-5 py-4">
    <div class="container py-2">
      <h2 class="title">Adjust Stock</h2>
      <ul class="breadcrumbs-custom-path mt-2">
        <li><a href="{{ url_for('shopkeeper.dashboard') }}">Dashboard</a></li>
        <li><a href="{{ url_for('shopkeeper.inventory') }}">Inventory</a></li>
        <li class="active"><span class="fa fa-arrow-right mx-2"></span> Adjust</li>
      </ul>
    </div>
  </div>
</section>
<div class="container py-5">
  <form method="post" action="{{ url_for('shopkeeper.inventory_adjust', inv_id=item.id) }}">
    <p class="mb-3"><strong>{{ item.name }}</strong> ({{ item.unit }})</p>
    <div class="form-group">
      <label>Quantity</label>
      <input type="number" name="quantity" min="0" step="0.01" value="{{ item.quantity }}" class="form-control" required>
    </div>
    <div class="form-group">
      <label>Price per unit (₹)</label>
      <input type="number" name="price_per_unit" min="0" step="0.01" value="{{ item.price_per_unit }}" class="form-control">
    </div>
    <button type="submit" class="btn btn-style btn-primary">Update</button>
    <a href="{{ url_for('shopkeeper.inventory') }}" class="btn btn-outline-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
